<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYY工具集 - 测试</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f8fafc; }
.test { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
.card { background: #fff; padding: 16px; margin: 8px 0; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; align-items: center; gap: 12px; }
.card:hover { border-color: #0052FF; }
.logo { width: 36px; height: 36px; border-radius: 8px; background: #f1f5f9; }
.info { flex: 1; }
.name { font-weight: 600; color: #1e293b; }
.cat { font-size: 12px; color: #64748B; }
h1 { color: #1e293b; }
.error { background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 8px; }
</style>
</head>
<body>
<h1>CYY工具集 - 书签测试</h1>
<div id="status" class="test">加载中...</div>
<div id="cards"></div>

<script>
var bookmarksData = [{"category": "AI对话", "title": "ChatGPT", "url": "https://chat.openai.com", "logo": "https://www.google.com/s2/favicons?domain=chat.openai.com&sz=64", "tags": ["AI", "对话"]}, {"category": "AI对话", "title": "Claude", "url": "https://claude.ai", "logo": "https://www.google.com/s2/favicons?domain=claude.ai&sz=64", "tags": ["AI", "对话"]}, {"category": "AI绘画", "title": "Midjourney", "url": "https://midjourney.com", "logo": "https://www.google.com/s2/favicons?domain=midjourney.com&sz=64", "tags": ["AI", "绘画"]}];

var CAT_ORDER = ["AI对话", "AI绘画", "AI应用", "设计素材", "设计工具", "效率工具", "数据分析", "常用工具", "企业内部", "学习资源", "参考导航", "其他"];

try {
    document.getElementById("status").innerHTML = "书签数量: " + bookmarksData.length + "<br>加载成功!";
    
    var grouped = {};
    bookmarksData.forEach(function(b) {
        if (!grouped[b.category]) grouped[b.category] = [];
        grouped[b.category].push(b);
    });
    
    var html = "";
    CAT_ORDER.forEach(function(cat) {
        if (!grouped[cat]) return;
        html += "<h2 style='margin-top:20px'>" + cat + " (" + grouped[cat].length + ")</h2>";
        grouped[cat].forEach(function(bm) {
            html += '<a href="' + bm.url + '" target="_blank" class="card">';
            html += '<img class="logo" src="' + bm.logo + '" onerror="this.style.background=\'#e2e8f0\'">';
            html += '<div class="info"><div class="name">' + bm.title + '</div><div class="cat">' + bm.tags.join(", ") + '</div></div>';
            html += '</a>';
        });
    });
    
    document.getElementById("cards").innerHTML = html;
} catch(e) {
    document.getElementById("status").innerHTML = '<div class="error">错误: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
