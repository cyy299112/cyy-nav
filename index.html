<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>CYY Tool Collection</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f8fafc; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: white; border-right: 1px solid #e5e7eb; padding: 24px 16px; }
.logo { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 20px; display: block; text-decoration: none; }
.logo span { color: #0052FF; }
.main { margin-left: 240px; padding: 32px; }
h2 { font-size: 16px; color: #0052FF; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }
.card { display: flex; align-items: center; gap: 12px; padding: 14px 12px; background: white; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; text-decoration: none; transition: all 0.2s; }
.card:hover { border-color: #0052FF; box-shadow: 0 2px 8px rgba(0,82,255,0.1); transform: translateY(-1px); }
.logo-img { width: 32px; height: 32px; border-radius: 6px; background: #f1f5f9; flex-shrink: 0; }
.card-title { font-size: 14px; font-weight: 500; color: #1e293b; }
</style>
</head>
