var CAT_ORDER = ["AIGC & AI工具", "产品设计", "设计资源", "开发工具", "数据可视化", "参考网站", "学习教育", "公司产品", "工作效率"];
var currentCat = "all";
var searchTerm = "";

var categoryNav = document.getElementById("categoryNav");
var mainContent = document.getElementById("mainContent");
var searchInput = document.getElementById("searchInput");

function loadBg() {
  var savedBg = localStorage.getItem('cyyNav_heroBg');
  var heroBg = document.getElementById('heroBg');
  if (savedBg) {
    heroBg.style.backgroundImage = savedBg;
    heroBg.style.display = 'block';
  } else {
    heroBg.style.display = 'none';
  }
}

function renderCategoryNav() {
  var totalCounts = {};
  bookmarksData.forEach(function(b) { totalCounts[b.category] = (totalCounts[b.category] || 0) + 1; });
  var total = bookmarksData.length;
  var html = '<div class="category-item ' + (currentCat==='all'?'active':'') + '" onclick="selectCategory(\'all\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>全部</span><span class="category-count">' + total + '</span></div>';
  CAT_ORDER.forEach(function(cat) {
    var cnt = totalCounts[cat] || 0;
    if (!cnt) return;
    html += '<div class="category-item ' + (currentCat===cat?'active':'') + '" onclick="selectCategory(\'' + cat + '\')">' + CAT_ICONS[cat] + '<span>' + cat + '</span><span class="category-count">' + cnt + '</span></div>';
  });
  categoryNav.innerHTML = html;
}

function renderContent() {
  var filtered = bookmarksData;
  if (currentCat !== "all") filtered = filtered.filter(function(b) { return b.category === currentCat; });
  if (searchTerm) {
    var term = searchTerm.toLowerCase();
    filtered = filtered.filter(function(b) { return b.title.toLowerCase().includes(term) || b.url.toLowerCase().includes(term); });
  }
  if (filtered.length === 0) { mainContent.innerHTML = "<p style='text-align:center;padding:3rem;color:#64748B'>未找到相关内容</p>"; return; }
  var grouped = {};
  filtered.forEach(function(b) { if (!grouped[b.category]) grouped[b.category] = []; grouped[b.category].push(b); });
  var html = "";
  CAT_ORDER.forEach(function(cat) {
    if (!grouped[cat]) return;
    var items = grouped[cat];
    html += '<div class="section-header"><div class="section-icon">' + CAT_ICONS[cat] + '</div><div class="section-title">' + cat + '</div><div class="section-count">' + items.length + '</div></div><div class="cards-grid">';
    items.forEach(function(bm) {
      html += '<a href="' + bm.url + '" target="_blank" class="card"><img class="card-logo" src="' + bm.logo + '"><div class="card-info"><div class="card-name">' + bm.title + '</div><div class="card-tags"><span class="card-tag">' + (bm.tags[0] || '') + '</span></div></div></a>';
    });
    html += '</div>';
  });
  mainContent.innerHTML = html;
}

function selectCategory(cat) { currentCat = cat; renderCategoryNav(); renderContent(); }
function doSearch(term) { searchInput.value = term; searchTerm = term; renderContent(); }
searchInput.addEventListener("input", function(e) { searchTerm = e.target.value; renderContent(); });

loadBg();
renderCategoryNav();
renderContent();
