<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加到 CYY工具集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 20px; padding: 40px; width: 480px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .header { text-align: center; margin-bottom: 30px; }
    .logo { width: 60px; height: 60px; background: linear-gradient(135deg, #0052FF, #4D7CFF); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .logo svg { width: 30px; height: 30px; color: #fff; }
    h1 { font-size: 22px; color: #1e293b; margin-bottom: 6px; }
    p { font-size: 14px; color: #64748B; }
    .preview { background: #f8fafc; border-radius: 12px; padding: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .preview img { width: 40px; height: 40px; border-radius: 8px; background: #e2e8f0; }
    .preview-info { flex: 1; min-width: 0; }
    .preview-title { font-size: 14px; font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-url { font-size: 12px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #64748B; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; }
    .form-group input:focus, .form-group select:focus { border-color: #0052FF; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-cancel { background: #f1f5f9; color: #64748B; }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-primary { background: linear-gradient(135deg, #0052FF, #4D7CFF); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hint { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 10px; padding: 14px 16px; margin-top: 20px; font-size: 13px; color: #92400e; }
    .hint strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </div>
      <h1>添加到 CYY工具集</h1>
      <p>快速将当前网页添加到你的导航书签</p>
    </div>
    
    <div class="preview">
      <img id="favicon" src="https://www.google.com/s2/favicons?domain=&sz=64" onerror="this.style.display='none'">
      <div class="preview-info">
        <div class="preview-title" id="title">加载中...</div>
        <div class="preview-url" id="url">-</div>
      </div>
    </div>
    
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="input-title" placeholder="网站名称">
    </div>
    <div class="form-group">
      <label>分类</label>
      <select id="input-category">
        <option value="其他">其他</option>
        <option value="AI对话">AI对话</option>
        <option value="AI绘画">AI绘画</option>
        <option value="AI应用">AI应用</option>
        <option value="设计素材">设计素材</option>
        <option value="设计工具">设计工具</option>
        <option value="效率工具">效率工具</option>
        <option value="数据分析">数据分析</option>
        <option value="常用工具">常用工具</option>
        <option value="企业内部">企业内部</option>
        <option value="学习资源">学习资源</option>
        <option value="参考导航">参考导航</option>
      </select>
    </div>
    <div class="form-group">
      <label>标签（逗号分隔）</label>
      <input type="text" id="input-tags" placeholder="如: AI, 工具">
    </div>
    
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="history.back()">取消</button>
      <button class="btn btn-primary" onclick="save()">保存到书签</button>
    </div>
    
    <div class="hint">
      <strong>💡 浏览器扩展方式（推荐）</strong>
      右键点击上方按钮，将链接保存为书签。访问任意页面时点击该书签，即可快速添加！
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    var url = document.referrer || localStorage.getItem("lastUrl") || "";
    var title = document.title;
    
    document.getElementById("title").textContent = title;
    document.getElementById("url").textContent = url;
    document.getElementById("favicon").src = "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(url) + "&sz=64";
    document.getElementById("input-title").value = title;
    
    function save() {
      var title = document.getElementById("input-title").value.trim();
      var category = document.getElementById("input-category").value;
      var tagsStr = document.getElementById("input-tags").value.trim();
      var tags = tagsStr ? tagsStr.split(",").map(function(t) { return t.trim(); }).filter(function(t) { return t; }) : [];
      
      if (!title) { showToast("请输入名称"); return; }
      
      var favicon = "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(url) + "&sz=64";
      var newBookmark = { title: title, url: url, logo: favicon, category: category, tags: tags, isCustom: true, addedAt: Date.now() };
      
      var customBookmarks = JSON.parse(localStorage.getItem("cyyNav_customBookmarks") || "[]");
      
      // 检查是否已存在
      var exists = customBookmarks.some(function(b) { return b.url === url; });
      if (exists) {
        showToast("该网址已在书签中");
        return;
      }
      
      customBookmarks.unshift(newBookmark);
      localStorage.setItem("cyyNav_customBookmarks", JSON.stringify(customBookmarks));
      showToast("已添加到「" + category + "」！共 " + customBookmarks.length + " 个书签");
      
      setTimeout(function() { history.back(); }, 1500);
    }
    
    function showToast(msg) {
      var t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(function() { t.classList.remove("show"); }, 3000);
    }
    
    document.addEventListener("keydown", function(e) { if (e.key === "Enter") save(); });
  </script>
</body>
</html>
